{% extends "base.html" %}

{% block content %}

<div class="hobbies-section">
    <h2 class="hobbies-person-header">Ruth</h2>
    <div class="hobbies-grid">
        {% for hobby in hobbies.ruth %}
        <div class="hobby-card">
            <img src="/static/{{ hobby.image }}" alt="{{ hobby.name }}" class="hobby-image" />
            <div class="hobby-info">
                <h3>{{ hobby.name }}</h3>
                <p>{{ hobby.description }}</p>
            </div>
        </div>
        {% endfor %}
    </div>
</div>

<div class="hobbies-section">
    <h2 class="hobbies-person-header">Thrinayani</h2>
    <div class="hobbies-grid">
        {% for hobby in hobbies.thrinayani %}
        <div class="hobby-card">
            <img src="/static/{{ hobby.image }}" alt="{{ hobby.name }}" class="hobby-image" />
            <div class="hobby-info">
                <h3>{{ hobby.name }}</h3>
                <p>{{ hobby.description }}</p>
            </div>
        </div>
        {% endfor %}
    </div>
</div>

{% endblock %}
